<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Bridge</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      width: 360px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #555;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0052a3;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }
    #status.success { color: #2e7d32; }
    #status.error   { color: #c62828; }
  </style>
</head>
<body>
  <h1>Agent Bridge</h1>
  <label for="prompt">Prompt</label>
  <textarea id="prompt" placeholder="Paste or type the prompt to send to your local agent..."></textarea>
  <button id="submit">Send to Agent</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
