<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Bridge</title>
  <link rel="stylesheet" href="theme/librarian-tokens.css">
  <style>
    body {
      font-family: var(--librarian-font-family);
      margin: 0;
      padding: 0;
      width: 360px;
      box-sizing: border-box;
    }

    /* ── Pairing Status Bar ──────────────────────────────────────────── */
    .pairing-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--librarian-space-2) var(--librarian-space-4);
      font-size: var(--librarian-text-xs);
      border-bottom: 1px solid var(--librarian-border);
      background: var(--librarian-bg);
    }
    .pairing-bar__status {
      display: flex;
      align-items: center;
      gap: var(--librarian-space-2);
    }
    .pairing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .pairing-dot--paired   { background: var(--librarian-status-approved); }
    .pairing-dot--unpaired { background: var(--librarian-status-rejected); }
    .pairing-dot--error    { background: var(--librarian-status-needs-review); }
    .pairing-bar__label {
      color: var(--librarian-text-muted);
    }
    .pairing-bar__client {
      color: var(--librarian-text);
      font-family: var(--librarian-font-mono);
      font-size: 0.7rem;
    }
    .pairing-bar__action {
      background: none;
      border: 1px solid var(--librarian-border);
      border-radius: var(--librarian-radius-sm);
      padding: 2px 8px;
      font-size: 0.7rem;
      font-family: var(--librarian-font-family);
      cursor: pointer;
      color: var(--librarian-text-muted);
    }
    .pairing-bar__action:hover {
      background: var(--librarian-bg-muted);
      color: var(--librarian-status-rejected);
    }

    /* ── Tab Navigation ────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--librarian-border);
      background: var(--librarian-bg);
    }
    .tab {
      flex: 1;
      padding: var(--librarian-space-3);
      text-align: center;
      font-size: var(--librarian-text-sm);
      font-weight: var(--librarian-font-medium);
      color: var(--librarian-text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover {
      color: var(--librarian-text);
    }
    .tab--active {
      color: var(--librarian-brand);
      border-bottom-color: var(--librarian-brand);
    }
    .tab-panel {
      padding: var(--librarian-space-4);
    }
    .tab-panel--hidden {
      display: none;
    }

    /* ── Submit Tab ────────────────────────────────────────────────── */
    label {
      display: block;
      font-size: var(--librarian-text-sm);
      margin-bottom: var(--librarian-space-1);
      color: var(--librarian-text-muted);
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: var(--librarian-space-2);
      font-size: var(--librarian-text-sm);
      border: 1px solid var(--librarian-border);
      border-radius: var(--librarian-radius-md);
      resize: vertical;
      box-sizing: border-box;
      font-family: var(--librarian-font-family);
    }
    textarea:focus {
      outline: none;
      border-color: var(--librarian-brand);
    }
    #submit {
      margin-top: var(--librarian-space-3);
      width: 100%;
      padding: var(--librarian-space-3);
      font-size: var(--librarian-text-sm);
      background: var(--librarian-brand);
      color: var(--librarian-text-inverse);
      border: none;
      border-radius: var(--librarian-radius-md);
      cursor: pointer;
      font-family: var(--librarian-font-family);
      font-weight: var(--librarian-font-medium);
    }
    #submit:hover {
      background: var(--librarian-brand-dark);
    }
    #submit:disabled {
      background: var(--librarian-border);
      color: var(--librarian-text-muted);
      cursor: not-allowed;
    }

    /* ── Review Tab ────────────────────────────────────────────────── */
    .review-summary {
      font-size: var(--librarian-text-sm);
    }
    .review-summary p {
      margin: var(--librarian-space-2) 0;
    }
    .review-summary .count-row {
      display: flex;
      justify-content: space-between;
      padding: var(--librarian-space-1) 0;
    }
    .review-summary .count-label {
      color: var(--librarian-text-muted);
    }
    .review-summary .count-value {
      font-weight: var(--librarian-font-semibold);
    }
    .review-link {
      display: block;
      text-align: center;
      margin-top: var(--librarian-space-3);
      padding: var(--librarian-space-2);
      background: var(--librarian-bg-subtle);
      border: 1px solid var(--librarian-border);
      border-radius: var(--librarian-radius-md);
      color: var(--librarian-brand);
      text-decoration: none;
      font-size: var(--librarian-text-sm);
      font-weight: var(--librarian-font-medium);
      cursor: pointer;
    }
    .review-link:hover {
      background: var(--librarian-bg-muted);
    }

    #review-status-msg {
      margin-top: var(--librarian-space-2);
      font-size: var(--librarian-text-xs);
      color: var(--librarian-text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Pairing Status Bar (AB-9) -->
  <div class="pairing-bar" id="pairing-bar">
    <div class="pairing-bar__status">
      <span class="pairing-dot pairing-dot--unpaired" id="pairing-dot"></span>
      <span class="pairing-bar__label" id="pairing-label">Checking pairing...</span>
      <span class="pairing-bar__client" id="pairing-client"></span>
    </div>
    <button class="pairing-bar__action" id="pairing-revoke-btn" style="display:none">Revoke</button>
  </div>

  <!-- Tab Navigation -->
  <nav class="tab-bar">
    <button class="tab tab--active" data-tab="submit">Submit</button>
    <button class="tab" data-tab="review">Review</button>
  </nav>

  <!-- Submit Panel -->
  <div class="tab-panel" id="panel-submit">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Paste or type the prompt to send to your local agent..."></textarea>
    <button id="submit">Send to Agent</button>
    <div id="status"></div>
  </div>

  <!-- Review Panel -->
  <div class="tab-panel tab-panel--hidden" id="panel-review">
    <div class="review-summary" id="review-summary">
      <p><strong>Decision Review</strong></p>
      <div class="count-row">
        <span class="count-label">Incoming</span>
        <span class="count-value" id="r-incoming">—</span>
      </div>
      <div class="count-row">
        <span class="count-label">Approved</span>
        <span class="count-value" id="r-approved">—</span>
      </div>
      <div class="count-row">
        <span class="count-label">In Progress</span>
        <span class="count-value" id="r-in-progress">—</span>
      </div>
      <div class="count-row">
        <span class="count-label">Complete</span>
        <span class="count-value" id="r-complete">—</span>
      </div>
      <div class="count-row">
        <span class="count-label">Rejected</span>
        <span class="count-value" id="r-rejected">—</span>
      </div>
      <a class="review-link" id="open-review-btn" href="#">Open Full Review &rarr;</a>
      <div id="review-status-msg"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
